# Normaliza los datos de rutas en cada push que toque data/routes.geojson:
# valida el esquema, sella metadata.generatedAt (sin él los clientes ignoran
# el cambio) y sincroniza la copia embebida assets/routes.json.
# Así se puede editar el geojson con cualquier herramienta (geojson.io,
# editor web de GitHub) sin correr `npm run data:update` a mano.
name: Normalizar datos de rutas

on:
  push:
    branches: [main]
    paths:
      - "data/routes.geojson"

jobs:
  stamp:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Validar y sellar datos
        run: node scripts/updateData.js
      - name: Commit de datos normalizados
        run: |
          if ! git diff --quiet; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add data/routes.geojson assets/routes.json
            git commit -m "chore: normaliza y sella datos de rutas [skip ci]"
            git push
          fi
